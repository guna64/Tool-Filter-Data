<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>CRM Tool - Filter Data Tenor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'&gt;&lt;rect width='24' height='24' rx='6' fill='%234f46e5'/&gt;&lt;path d='M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/&gt;&lt;/svg&gt;">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Mencegah scroll */
        }

        /* Subtle background gradient */
        .bg-main-gradient {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf7 100%);
        }

        /* Custom shadow for the elevated card */
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* Dashed border for the upload area */
        .upload-dashed {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }

        .upload-dashed:hover {
            border-color: #6366f1;
            background-color: #f8faff;
        }

        /* Animasi masuk untuk hasil */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in {
            animation: fadeInScale 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="bg-main-gradient h-screen w-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-8">
                    <div class="flex-shrink-0 flex items-center gap-2">
                        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                            <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"
                                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                        <span class="font-bold text-xl text-gray-900 tracking-tight">CRM Tool</span>
                    </div>
                    <nav class="hidden md:flex space-x-6 overflow-x-auto">
                        <a class="text-indigo-600 border-b-2 border-indigo-600 px-3 py-2 text-sm font-medium whitespace-nowrap"
                            href="index.html">Filter Tenor</a>
                        <a class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors whitespace-nowrap"
                            href="filter-stnk.html">Filter STNK</a>
                        <a class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors whitespace-nowrap"
                            href="cek-pajak.html">Cek Pajak Motor</a>
                        <a class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors whitespace-nowrap"
                            href="coming-soon.html">Filter by Pekerjaan</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6 overflow-hidden">
        <div class="w-full max-w-md md:max-w-xl">

            <div
                class="bg-white rounded-[2rem] p-6 sm:p-10 card-shadow text-center flex flex-col justify-center max-h-[85vh]">

                <div class="flex justify-center mb-4 sm:mb-6 flex-shrink-0">
                    <div
                        class="w-14 h-14 sm:w-16 sm:h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center">
                        <svg class="h-7 w-7 sm:h-8 sm:w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                    </div>
                </div>

                <div class="mb-6 sm:mb-8 flex-shrink-0">
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-1 sm:mb-2">Filter Data Tenor</h1>
                    <p class="text-gray-500 text-sm sm:text-lg">Cari pelanggan CREDIT (sisa tenor 1-3 bln)</p>
                </div>

                <div id="input-section" class="flex-grow">
                    <div class="mb-6">
                        <label class="cursor-pointer block" for="file-upload">
                            <div
                                class="upload-dashed rounded-3xl p-6 sm:p-8 flex flex-col items-center justify-center bg-gray-50">
                                <div class="mb-3 text-gray-400">
                                    <svg class="h-10 w-10 sm:h-14 sm:w-14" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
                                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                    </svg>
                                </div>
                                <p id="upload-text"
                                    class="text-lg sm:text-xl font-semibold text-gray-800 mb-1 truncate w-full px-2">
                                    Ketuk & Pilih File</p>
                                <p id="upload-hint" class="text-xs sm:text-sm text-gray-500">Format: .xlsx / .csv</p>
                            </div>
                            <input accept=".xlsx, .csv, .xls" class="hidden" id="file-upload" type="file" />
                        </label>
                    </div>

                    <div>
                        <button id="process-btn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 sm:py-4 rounded-2xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-indigo-200 text-base sm:text-lg flex items-center justify-center">
                            Mulai Proses
                        </button>
                        <p id="error-msg" class="mt-3 text-red-500 text-sm hidden"></p>
                    </div>
                </div>

                <div id="result-section" class="hidden animate-fade-in flex-grow flex flex-col justify-center">
                    <div class="bg-green-50 border border-green-200 rounded-3xl p-6 sm:p-8 mb-6">
                        <p class="text-green-800 text-sm sm:text-base font-medium mb-2">🎉 Berhasil menemukan data!</p>
                        <p id="result-count" class="text-5xl font-bold text-green-600 mb-2">0</p>
                        <p class="text-green-700 text-xs sm:text-sm">Pelanggan dengan sisa tenor 1-3 bulan</p>
                    </div>

                    <div class="space-y-3">
                        <a id="download-btn" href="#" download="Hasil_Filter_Tenor.xlsx"
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 sm:py-4 rounded-2xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-green-200 text-base sm:text-lg flex justify-center items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Download Excel
                        </a>

                        <button id="reset-btn"
                            class="w-full bg-white border-2 border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 text-gray-600 font-bold py-3 sm:py-4 rounded-2xl transition-all duration-300 text-sm sm:text-base">
                            Proses File Lain
                        </button>
                    </div>
                </div>

            </div>

            <p class="mt-4 sm:mt-8 text-center text-gray-400 text-xs sm:text-sm">
                Pastikan file memiliki kolom 'Tgl. Mohon', 'Tenor', dan 'Cash/Credit'.
            </p>
        </div>
    </main>
    <script>
        const fileInput = document.getElementById('file-upload');
        const uploadText = document.getElementById('upload-text');
        const uploadHint = document.getElementById('upload-hint');
        const processBtn = document.getElementById('process-btn');
        const errorMsg = document.getElementById('error-msg');

        const inputSection = document.getElementById('input-section');
        const resultSection = document.getElementById('result-section');
        const downloadBtn = document.getElementById('download-btn');
        const resultCount = document.getElementById('result-count');
        const resetBtn = document.getElementById('reset-btn');

        // File selection feedback
        fileInput.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                uploadText.textContent = fileName;
                uploadText.classList.add('text-indigo-600');
                uploadHint.textContent = 'File siap diproses';
                errorMsg.classList.add('hidden');
            }
        });

        // Reset UI to initial state
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            uploadText.textContent = 'Ketuk & Pilih File';
            uploadText.classList.remove('text-indigo-600');
            uploadHint.textContent = 'Format: .xlsx / .csv';
            resultSection.classList.add('hidden');
            inputSection.classList.remove('hidden');
        });

        // Processing functionality
        processBtn.addEventListener('click', () => {
            if (!fileInput.files.length) {
                errorMsg.textContent = '⚠️ Silakan pilih file terlebih dahulu.';
                errorMsg.classList.remove('hidden');
                return;
            }

            // Show loading state
            const originalBtnText = processBtn.innerHTML;
            processBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Memproses Data...
      `;
            processBtn.disabled = true;
            errorMsg.classList.add('hidden');

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function (e) {
                // Gunakan timeout kecil agar UI sempat merender status loading
                setTimeout(() => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array', cellDates: true });

                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet);

                        const currentDate = new Date();
                        const currentYear = currentDate.getFullYear();
                        const currentMonth = currentDate.getMonth() + 1;

                        // Proses Filter Data
                        const filteredData = jsonData.filter(row => {
                            // Pastikan status CREDIT
                            if (!row['Cash/Credit'] || String(row['Cash/Credit']).toUpperCase() !== 'CREDIT') return false;
                            if (!row['Tgl. Mohon'] || row['Tenor'] == null) return false;

                            let tglMohon = new Date(row['Tgl. Mohon']);
                            if (isNaN(tglMohon.getTime())) return false;

                            let mohonYear = tglMohon.getFullYear();
                            let mohonMonth = tglMohon.getMonth() + 1;

                            // Hitung jarak bulan
                            let bulanBerlalu = (currentYear - mohonYear) * 12 + (currentMonth - mohonMonth);
                            let sisaTenor = parseInt(row['Tenor']) - bulanBerlalu;

                            // Tambahkan kolom baru untuk hasil Excel
                            row['Bulan Berlalu'] = bulanBerlalu;
                            row['Sisa Tenor (Bulan)'] = sisaTenor;

                            // Ambil yang sisa tenornya 1 sampai 3 bulan
                            return sisaTenor > 0 && sisaTenor <= 3;
                        });

                        // Restore button state
                        processBtn.innerHTML = originalBtnText;
                        processBtn.disabled = false;

                        if (filteredData.length === 0) {
                            errorMsg.textContent = 'Pencarian selesai. Tidak ditemukan pelanggan dengan sisa tenor 1-3 bulan.';
                            errorMsg.classList.remove('hidden');
                            return;
                        }

                        // Generate file Excel hasil filter
                        const newWorksheet = XLSX.utils.json_to_sheet(filteredData);
                        const newWorkbook = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Hasil Filter");

                        const excelBuffer = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'array' });
                        const blob = new Blob([excelBuffer], { type: "application/octet-stream" });

                        // Siapkan tombol download
                        const url = URL.createObjectURL(blob);
                        downloadBtn.href = url;

                        // Tampilkan hasil
                        resultCount.textContent = filteredData.length;
                        inputSection.classList.add('hidden');
                        resultSection.classList.remove('hidden');

                    } catch (error) {
                        console.error(error);
                        processBtn.innerHTML = originalBtnText;
                        processBtn.disabled = false;
                        errorMsg.textContent = '❌ Gagal membaca file. Pastikan format Excel valid.';
                        errorMsg.classList.remove('hidden');
                    }
                }, 300); // Small delay for UX
            };

            reader.readAsArrayBuffer(file);
        });
    </script>
</body>

</html>
